<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1923" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f4f6f8" media="(prefers-color-scheme: light)">
<title>Løpetrener KI</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--accent:#00c9a7;--accent2:#00897b;--accent-glow:rgba(0,201,167,0.1);
--strava:#ff7043;--strava-glow:rgba(255,112,67,0.1);
--danger:#ef4444;--radius:14px;--radius-sm:10px;
/* Dark mode (default) */
--bg:#0f1923;--surface:#172030;--surface2:#1e2a3a;
--border:#263245;--text:#edf2f7;--text2:#7b8fa3;
}
@media(prefers-color-scheme:light){
:root{
--bg:#f4f6f8;--surface:#ffffff;--surface2:#eef1f5;
--border:rgba(0,0,0,0.08);--text:#1a2030;--text2:#5c6a7a;
--accent:#00a88e;--accent-glow:rgba(0,168,142,0.08);--strava-glow:rgba(255,112,67,0.06);
}
.msg.user .msg-bubble{color:#fff}
.btn-primary{color:#fff}
.send-btn{color:#fff}
.accent-card{border-color:var(--accent)}
.accent-card::before{background:radial-gradient(circle at 0% 50%,rgba(0,168,142,0.08),transparent 60%)}
.sub-tab.active{color:#fff}
.method-btn.active{color:#fff}
.api-setup h2,.settings-title{color:var(--text)}
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}
.icon{width:20px;height:20px;display:inline-block;vertical-align:middle}
.hide{display:none!important}

/* Tab Bar */
.tab-bar{display:flex;justify-content:space-around;padding:8px 0 max(12px,env(safe-area-inset-bottom));background:var(--surface);border-top:0.5px solid var(--border);flex-shrink:0}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text2);font-size:10px;font-family:inherit;cursor:pointer;padding:4px 8px}
.tab.active{color:var(--accent)}
.tab svg{width:22px;height:22px}

/* Content */
.app-content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{display:none;min-height:100%}
.page.active{display:block}

/* Buttons */
.btn-primary{padding:14px 28px;border-radius:var(--radius-sm);background:var(--accent);color:#0f1923;font-weight:700;font-size:15px;border:none;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:8px;transition:transform .15s}
.btn-primary:hover{transform:scale(1.02)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{padding:14px 28px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-weight:500;font-size:15px;border:1px solid var(--border);cursor:pointer;font-family:inherit}
.btn-strava{width:100%;padding:14px;border-radius:var(--radius-sm);background:var(--strava);color:#fff;font-weight:700;font-size:15px;border:none;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px}
.btn-strava:disabled{opacity:.4;cursor:not-allowed}

/* API Setup */
.api-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:100vh;gap:16px}
.api-setup h2{font-size:22px;font-weight:700}
.api-setup p{color:var(--text2);font-size:14px;line-height:1.6;max-width:320px}
.api-setup p strong{color:var(--accent)}
.api-input{width:100%;max-width:320px;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:'Space Mono',monospace;outline:none}
.api-input:focus{border-color:var(--accent)}

/* Onboarding */
.onboarding{padding:60px 24px 40px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}
.onboarding-progress{display:flex;gap:6px;margin-bottom:32px}
.progress-dot{width:100%;height:4px;border-radius:2px;background:var(--border);transition:background .3s}
.progress-dot.active{background:var(--accent)}
.onboarding-label{font-size:24px;font-weight:700;margin-bottom:24px}
.onboarding-input{width:100%;padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:18px;font-family:inherit;outline:none}
.onboarding-input:focus{border-color:var(--accent)}
.option-list{display:flex;flex-direction:column;gap:10px}
.option-btn{text-align:left;padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:10px}
.option-btn.selected{border-color:var(--accent);background:var(--accent-glow)}
.onboarding-nav{display:flex;gap:12px;margin-top:32px;justify-content:flex-end}

/* Dashboard */
.dashboard{padding:20px 16px 24px}
.dash-greeting-sub{display:block;font-size:14px;color:var(--text2);font-weight:400}
.dash-greeting{display:block;font-size:24px;font-weight:700;margin-top:2px}
.dash-goal{display:inline-block;margin-top:6px;padding:6px 14px;background:var(--accent-glow);color:var(--accent);border-radius:20px;font-size:13px;font-weight:500}
.dash-header{margin-bottom:20px}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:transform .15s,border-color .2s}
.dash-card:hover{transform:scale(1.01);border-color:var(--accent)}
.accent-card{display:flex;align-items:center;gap:14px;padding:18px;margin-bottom:16px;background:var(--accent);border:none;border-radius:var(--radius);position:relative;overflow:hidden;color:#0f1923}
.accent-card::before{display:none}
.accent-card-icon{font-size:28px;z-index:1;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.accent-card-title{font-weight:700;font-size:16px;z-index:1;color:#0f1923}
.accent-card-sub{color:rgba(15,25,35,0.6);font-size:13px;z-index:1}
.accent-card-arrow{margin-left:auto;font-size:20px;color:rgba(15,25,35,0.5);z-index:1}
@media(prefers-color-scheme:light){.accent-card-title{color:#fff}.accent-card-sub{color:rgba(255,255,255,0.8)}.accent-card-arrow{color:rgba(255,255,255,0.6)}}
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mini{padding:18px 14px;text-align:center}
.mini-emoji{font-size:26px;margin-bottom:6px}
.mini-label{font-size:13px;font-weight:500;color:var(--text2)}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:15px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.refresh-btn{background:none;border:none;color:var(--text2);cursor:pointer;padding:4px}
.refresh-btn:hover{color:var(--accent)}
.refresh-btn svg{width:16px;height:16px}
.dash-section{margin-bottom:20px}
.dash-stats{display:flex;justify-content:space-around;padding:18px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border)}
.strava-stats{border-color:rgba(252,76,2,.25);margin-bottom:10px}
.stat{text-align:center}
.stat-value{font-size:22px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)}
.strava-val{color:var(--strava)!important}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em}
.strava-recent{display:flex;flex-direction:column;gap:8px}
.strava-activity{padding:12px 14px;background:var(--surface);border-radius:var(--radius-sm);border:1px solid var(--border)}
.strava-act-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.strava-act-name{font-weight:600;font-size:14px}
.strava-act-date{font-family:'Space Mono',monospace;font-size:11px;color:var(--text2)}
.strava-act-stats{display:flex;gap:12px;font-size:12px;color:var(--text2)}
.strava-cta{display:flex;align-items:center;gap:10px;padding:14px 16px;background:var(--strava-glow);border:1px solid rgba(252,76,2,.25);border-radius:var(--radius-sm);color:var(--strava);cursor:pointer;font-size:13px;font-weight:500}
.strava-cta svg{width:18px;height:18px;flex-shrink:0}

/* Method toggle */
.dash-top-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.method-badge{font-size:11px;padding:5px 14px;border-radius:20px;background:var(--accent-glow);color:var(--accent);font-weight:600}
.method-toggle{display:flex;gap:0;margin-bottom:16px;background:var(--surface);border-radius:24px;padding:3px}
.method-btn{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;background:transparent;border:none;border-radius:20px;color:var(--text2);cursor:pointer;font-family:inherit;transition:all .2s}
.method-btn.active{background:var(--accent);color:#0f1923}

/* Goal card */
.goal-card{background:var(--surface);border:0.5px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--radius);padding:16px;margin-bottom:16px;cursor:pointer;transition:border-color .2s}
.goal-card:hover{border-color:var(--accent)}
.goal-card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.goal-card-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.goal-card-title{font-size:18px;font-weight:700;margin-top:4px}
.goal-card-countdown{text-align:right}
.goal-countdown-num{font-size:22px;font-weight:700;font-family:'Space Mono',monospace;color:var(--accent)}
.goal-countdown-lbl{font-size:11px;color:var(--text2)}
.goal-progress-bar{height:6px;border-radius:3px;background:var(--border);overflow:hidden;margin-bottom:6px}
.goal-progress-fill{height:100%;border-radius:3px;background:var(--accent);transition:width .3s}
.goal-card-sub{font-size:11px;color:var(--text2)}
.goal-card-empty{display:flex;align-items:center;gap:10px;padding:16px;background:var(--accent-glow);border:1px dashed var(--accent);border-radius:var(--radius);color:var(--accent);cursor:pointer;font-size:14px;font-weight:600;margin-bottom:16px}

/* Dashboard grid 4-col */
.dash-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px}
.dash-grid-4 .mini{padding:14px 6px;border-radius:12px;background:var(--surface)}

/* Week stats */
.dash-section-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em}
.week-stats{display:flex;gap:8px;margin-bottom:16px}
.week-stat{flex:1;background:var(--surface2);border-radius:10px;padding:12px;text-align:center}
.week-stat-val{font-size:20px;font-weight:700;font-family:'Space Mono',monospace;color:var(--text)}
.week-stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* Recent list */
.recent-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.recent-item{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface);border-radius:10px;border-left:3px solid var(--accent)}
.recent-item.hard{border-left-color:var(--strava)}
.recent-dot{display:none}
.recent-name{display:block;font-size:14px;font-weight:600;color:var(--text)}
.recent-km{display:block;font-size:12px;color:var(--text2);margin-top:2px}
.recent-ago{font-size:11px;color:var(--text2);font-family:'Space Mono',monospace;flex-shrink:0}

/* Goal page */
.goal-page{padding:20px 16px}
.goal-page-title{font-size:22px;font-weight:700;margin:16px 0 20px}
.gpx-loaded{padding:12px}
.gpx-loaded-title{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:4px}
.gpx-loaded-stats{font-size:13px;color:var(--text2);margin-bottom:8px}

/* Auth */
.auth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;min-height:100vh;gap:16px}
.auth-page h2{font-size:24px;font-weight:700}
.auth-page p{color:var(--text2);font-size:14px;line-height:1.6;max-width:300px}
.auth-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:10px}
.auth-input{width:100%;padding:14px 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;font-family:inherit;outline:none}
.auth-input:focus{border-color:var(--accent)}
.auth-error{color:var(--danger);font-size:13px;text-align:center}
.auth-switch{color:var(--text2);font-size:13px;margin-top:8px}
.auth-switch button{background:none;border:none;color:var(--accent);font-weight:600;cursor:pointer;font-family:inherit;font-size:13px}
.auth-loading{color:var(--text2);font-size:14px;padding:60px}
.logout-btn{margin-top:12px;padding:12px;border-radius:var(--radius-sm);background:transparent;color:var(--danger);font-weight:600;font-size:14px;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-family:inherit;width:100%}

/* Strava Setup */
.strava-setup{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px}
.strava-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.strava-header h3{font-size:18px;font-weight:700}
.strava-logo{color:var(--strava)}
.strava-logo svg{width:24px;height:24px}
.strava-status{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;margin-bottom:14px}
.strava-status.connected{background:var(--accent-glow);color:var(--accent)}
.strava-status.connecting{background:var(--strava-glow);color:var(--strava)}
.strava-status.error{background:rgba(239,68,68,.1);color:var(--danger)}
.strava-guide{margin-bottom:16px}
.guide-title{font-weight:700;font-size:14px;margin-bottom:10px}
.guide-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px;color:var(--text2);line-height:1.5}
.guide-step strong{color:var(--text)}
.step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--accent-glow);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.guide-url{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:11px;font-family:'Space Mono',monospace;color:var(--text2);word-break:break-all;line-height:1.6;margin:4px 0 8px 32px}
.guide-url strong{color:var(--strava)}
.strava-form label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:14px}
.strava-form label:first-child{margin-top:0}
.strava-form input{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.strava-form input:focus{border-color:var(--strava)}

/* Settings */
.settings-page{padding:20px 16px}
.settings-title{font-size:22px;font-weight:700;margin-bottom:20px}
.settings-row{display:flex;align-items:center;gap:14px;width:100%;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;font-family:inherit;color:var(--text);text-align:left;margin-bottom:12px}
.settings-row:hover{border-color:var(--accent)}
.settings-row svg{width:22px;height:22px;color:var(--accent);flex-shrink:0}
.settings-row-title{font-weight:700;font-size:15px}
.settings-row-sub{font-size:13px;color:var(--text2)}
.settings-arrow{margin-left:auto;color:var(--text2)}
.reset-btn{margin-top:24px;width:100%;padding:14px;border-radius:var(--radius-sm);background:rgba(239,68,68,.1);color:var(--danger);font-weight:600;font-size:14px;border:1px solid rgba(239,68,68,.2);cursor:pointer;font-family:inherit}

/* Chat */
.chat-page{display:flex;flex-direction:column;height:100%}
.chat-messages{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.chat-empty{text-align:center;padding:60px 20px;color:var(--text2)}
.chat-empty-icon{font-size:40px;margin-bottom:12px}
.chat-empty-sub{font-size:12px;margin-top:6px;color:var(--accent)}
.msg{margin-bottom:12px;display:flex}
.msg.user{justify-content:flex-end}
.msg-bubble{max-width:85%;padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.55}
.msg.user .msg-bubble{background:var(--accent);color:#0f1923;border-bottom-right-radius:4px;font-weight:500}
.msg.assistant .msg-bubble{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-bubble h4{font-weight:700;font-size:15px;margin:8px 0 4px}
.msg-bubble .bold{font-weight:700}
.msg-bubble .li{padding-left:8px}
.msg-bubble p{margin-bottom:2px}
.loading-bubble{display:flex;align-items:center;height:24px}
.dot-loader{display:flex;gap:5px}
.dot-loader span{width:8px;height:8px;border-radius:50%;background:var(--text2);animation:dotPulse 1.2s infinite}
.dot-loader span:nth-child(2){animation-delay:.2s}
.dot-loader span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.chat-input-bar{display:flex;gap:8px;padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0}
.chat-input{flex:1;padding:12px 16px;border-radius:24px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.chat-input:focus{border-color:var(--accent)}
.send-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#0f1923;flex-shrink:0}
.send-btn:disabled{opacity:.3;cursor:not-allowed}
.send-btn svg{width:18px;height:18px}

/* Log */
.log-page{padding:20px 16px}
.log-summary{display:flex;justify-content:space-around;padding:18px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:16px}
.add-log-btn{width:100%;justify-content:center;margin-bottom:16px;padding:10px 20px;font-size:13px}
.log-form{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.log-form label{display:block;font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;margin-top:14px}
.log-form label:first-child{margin-top:0}
.log-form input,.log-form select,.log-form textarea{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;outline:none}
.log-form textarea{min-height:60px;resize:vertical}
.log-form input:focus,.log-form select:focus,.log-form textarea:focus{border-color:var(--accent)}
.feeling-row{display:flex;gap:8px}
.feeling-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;cursor:pointer;font-family:inherit}
.feeling-btn.selected{border-color:var(--accent);background:var(--accent-glow)}
.form-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.log-list{display:flex;flex-direction:column;gap:10px}
.log-entry{padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm)}
.log-entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.log-entry-date{font-family:'Space Mono',monospace;font-size:12px;color:var(--text2)}
.log-entry-feeling{font-size:16px}
.log-entry-type{font-weight:700;font-size:15px}
.log-entry-stats{color:var(--text2);font-size:13px;margin-top:2px}
.log-entry-notes{color:var(--text2);font-size:13px;margin-top:6px;font-style:italic;border-top:1px solid var(--border);padding-top:6px}

/* Source badges & shoe tags */
.src-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.strava-badge{background:var(--strava-glow);color:var(--strava)}
.manual-badge{background:var(--accent-glow);color:var(--accent)}
.shoe-tag{font-size:12px;color:var(--text2);display:inline-block;margin-top:4px}

const LS = k => JSON.parse(localStorage.getItem('rc_'+k) || 'null');
const SS = (k,v) => { localStorage.setItem('rc_'+k, JSON.stringify(v)); debounceSaveCloud(); };

let _saveTimer = null;
function debounceSaveCloud(){ clearTimeout(_saveTimer); _saveTimer = setTimeout(saveToCloud, 1500); }

async function saveToCloud(){
  const user = window.currentUser;
  if(!user) return;
  try {
    const data = {
      apiKey: state.apiKey,
      profile: state.profile,
      profileDone: state.profileDone,
      stravaCreds: state.stravaCreds,
      stravaActivities: state.stravaActivities,
      chatHistory: state.chatHistory,
      activitySummaries: state.activitySummaries,
      shoes: state.shoes,
      shoeMap: state.shoeMap,
      method: state.method,
      goal: state.goal,
      updatedAt: new Date().toISOString()
    };
    await window.fbSetDoc(window.fbDoc(window.fbDb, 'users', user.uid), data, {merge:true});
  } catch(e) { console.error('Cloud save error:', e); }
}

async function loadFromCloud(uid){
  try {
    const snap = await window.fbGetDoc(window.fbDoc(window.fbDb, 'users', uid));
    if(snap.exists()){
      const d = snap.data();
      if(d.apiKey) { state.apiKey = d.apiKey; localStorage.setItem('rc_apiKey', JSON.stringify(d.apiKey)); }
      if(d.profile) { state.profile = d.profile; localStorage.setItem('rc_profile', JSON.stringify(d.profile)); }
      if(d.profileDone) { state.profileDone = d.profileDone; localStorage.setItem('rc_profileDone', JSON.stringify(d.profileDone)); }
      if(d.stravaCreds) { state.stravaCreds = d.stravaCreds; localStorage.setItem('rc_stravaCreds', JSON.stringify(d.stravaCreds)); }
      if(d.stravaActivities?.length) { state.stravaActivities = d.stravaActivities; localStorage.setItem('rc_stravaActivities', JSON.stringify(d.stravaActivities)); }
      if(d.chatHistory?.length) { state.chatHistory = d.chatHistory; localStorage.setItem('rc_chatHistory', JSON.stringify(d.chatHistory)); }
      if(d.activitySummaries) { state.activitySummaries = d.activitySummaries; localStorage.setItem('rc_activitySummaries', JSON.stringify(d.activitySummaries)); }
      if(d.shoes?.length) { state.shoes = d.shoes; localStorage.setItem('rc_shoes', JSON.stringify(d.shoes)); }
      if(d.shoeMap) { state.shoeMap = d.shoeMap; localStorage.setItem('rc_shoeMap', JSON.stringify(d.shoeMap)); }
      if(d.method) { state.method = d.method; localStorage.setItem('rc_method', JSON.stringify(d.method)); }
      if(d.goal !== undefined) { state.goal = d.goal; localStorage.setItem('rc_goal', JSON.stringify(d.goal)); }
    } else {
      // Cloud is empty — migrate existing localStorage data to cloud
      if(state.apiKey || state.profileDone) {
        await saveToCloud();
      }
    }
  } catch(e) { console.error('Cloud load error:', e); }
}

const API_MODEL = 'claude-sonnet-4-20250514';

const METHOD_PROMPTS = {
'80/20': `## Treningsfilosofi: 80/20-metoden
Din kjernefilosofi er 80/20-metoden (også kjent som polarisert trening):
- Ca. 80 % av treningsvolumet skal være i lav intensitet (sone 1–2, rolig prat-tempo, puls under 75–80 % av makspuls)
- Ca. 20 % av treningsvolumet skal være i høy intensitet (sone 4–5, intervaller, tempo, bakkeløp)
- Svært lite trening i "gråsonen" / middels intensitet (sone 3) — dette gir mest slitasje med minst utbytte
- Forklar gjerne HVORFOR en økt er rolig eller hard, slik at brukeren forstår metoden
- Når du lager ukeplaner, sørg for at fordelingen følger 80/20-prinsippet
- Oppmuntre brukeren til å holde de rolige øktene VIRKELIG rolige — dette er nøkkelen`,

'norwegian': `## Treningsfilosofi: Norwegian singles (terskelmetoden)
Din kjernefilosofi er Norwegian singles, også kjent som den norske terskelmetoden (brukt av bl.a. Ingebrigtsen-brødrene og Marius Bakken):
- Kjerneøkten er terskelintervaller: 5–6 × 5–6 minutter i terskelsone (sone 3–4, rundt laktatterskelen) med kort pause (60–90 sek rolig jogg mellom)
- "Singles" = enkeltdrag, ikke serier. Kvalitet over kvantitet.
- De rolige dagene skal fortsatt være ROLIGE (sone 1–2) — metoden er ikke "løp hardt hver dag"
- Typisk uke: 1–2 terskeløkter, 1 langtur, resten rolig løp
- Tempoet på terskelintervallene skal være "kontrollert hardt" — du skal kunne holde det i 50–60 minutter om du måtte
- Progrider ved å øke antall intervaller eller lengden på dem, ikke tempoet
- Denne metoden bygger laktatterskelen effektivt og er mindre belastende enn klassiske VO2max-intervaller
- Forklar HVORFOR terskeltrening er effektivt og hvordan det skiller seg fra 80/20`
};

function getSystemPrompt(){
  const methodPrompt = METHOD_PROMPTS[state.method] || METHOD_PROMPTS['80/20'];
  const goalCtx = state.goal ? `\n\n## Aktivt treningsmål
Brukeren har et aktivt mål:
- Distanse: ${state.goal.distance}
- Tidsmål: ${state.goal.time}
- Løp: ${state.goal.raceName || 'Generelt'}
- Dato: ${state.goal.raceDate || 'Ikke satt'}
${state.goal.gpxInfo ? `- Terrenginfo fra GPX: ${state.goal.gpxInfo}` : ''}
${state.goal.isTrail ? '- Dette er et TERRENGLØP — tilpass styrketrening med fokus på stigning, nedoverbakke, ankelstabilitet og ujevnt underlag' : ''}
Tilpass ALLE treningsforslag mot dette målet. Beregn hvor mange uker det er igjen og periodiser treningen deretter. Vurder brukerens nåværende form opp mot målet og gi ærlig feedback om målet er realistisk.` : '';

  return `Du er en erfaren og motiverende løpetrener-KI. Du snakker norsk.
Du gir personlige treningsråd, løpeøkter og programmer basert på brukerens profil.

${methodPrompt}

## Bruk av treningsdata
Du har tilgang til brukerens faktiske treningshistorikk fra Strava (og/eller manuelt logget).
Analyser dataene for å:
- Vurdere nåværende treningsbelastning og om brukeren bør øke/redusere
- Se mønstre i intensitet, distanse og frekvens
- Tilpasse forslag basert på hva som faktisk er gjort siste ukene
- Gi konkrete tilbakemeldinger på tempofordeling
- Beregne ukentlig kilometervolum og trend

Når du foreslår en økt, bruk dette formatet:
- Type økt (rolig løp, intervall, tempo, langtur osv.) + intensitetssone
- Oppvarming
- Hoveddel med tempo/puls-anbefalinger
- Nedjogging
- Estimert tid og distanse

## Styrketrening for løpere
Styrketrening er en sentral del av treningsopplegget. Brukeren har noe kneproblemer — ta hensyn til dette, men ikke gjør det til eneste fokus.
Regler:
- Foreslå ALLTID 2 styrkeøkter per uke i ukeplaner
- Hver økt skal vare 30–60 minutter INKLUDERT hvile mellom sett
- Fokus: løpsspesifikk styrke med hovedvekt på underkropp (lår, rumpe, hofter, legger) + core/bål
- Varier mellom to typer økter:
  * Hjemmeøkter (uten utstyr/vekter): kroppsvektøvelser som utfall, knebøy, step-ups, ettbeinsøvelser, rumpeløft, planke-varianter, sideliggende hoftereising osv.
  * Studioøkter (med tilgang til vekter/maskiner): knebøy med vektstang, beinpress, rumensk markløft, hip thrust, lunges med manualer, leggpress, kabel-øvelser osv.
- Marker tydelig om økten er en hjemmeøkt eller studioøkt
- Varier øvelsesutvalget fra uke til uke for å holde det interessant og trene allsidig
- Legg styrkeøktene på dager som IKKE er harde løpeøkter (helst etter rolige løp eller på hviledager)
- Formater styrkeøkter tydelig med: øvelse, sett x reps, pausetid, og korte forklaringer på utførelse
- Progrider over tid: øk volum, vekt eller vanskelighetsgrad gradvis
${goalCtx}

Vær motiverende men realistisk. Ta hensyn til skadeforebygging.
Bruk emojier sparsomt men effektivt for å gjøre det visuelt.
Hold svarene konsise og handlingsorienterte.`;
}

// ─── Strava ───
function fmtActivity(a){
  const date=new Date(a.start_date_local).toISOString().slice(0,10);
  const km=(a.distance/1000).toFixed(1);
  const mins=Math.round(a.moving_time/60);
  const pr=a.distance>0?a.moving_time/60/(a.distance/1000):0;
  const pm=Math.floor(pr), ps=Math.round((pr-pm)*60).toString().padStart(2,'0');
  const pace=`${pm}:${ps}`;
  const hr=a.average_heartrate?Math.round(a.average_heartrate):null;
  const maxHr=a.max_heartrate?Math.round(a.max_heartrate):null;
  return {date,name:a.name,km,mins,pace,hr,maxHr,elev:Math.round(a.total_elevation_gain),suffer:a.suffer_score,type:a.type};
}
function fmtStravaForAI(acts){
  if(!acts.length)return'';
  const runs=acts.filter(a=>a.type==='Run'||a.type==='TrailRun');
  if(!runs.length)return'\n\nIngen løpeøkter funnet i Strava nylig.';
  const weeks={};
  runs.forEach(a=>{const d=new Date(a.start_date_local),ws=new Date(d);ws.setDate(d.getDate()-d.getDay()+1);const k=ws.toISOString().slice(0,10);if(!weeks[k])weeks[k]={km:0,count:0,mins:0};weeks[k].km+=a.distance/1000;weeks[k].count++;weeks[k].mins+=a.moving_time/60});
  const ws=Object.entries(weeks).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,4).map(([w,d])=>`  Uke ${w}: ${d.km.toFixed(1)} km, ${d.count} økter, ${Math.round(d.mins)} min`).join('\n');
  const rr=runs.slice(0,10).map(a=>{const f=fmtActivity(a);return`  ${f.date}: "${f.name}" — ${f.km} km, ${f.mins} min, tempo ${f.pace} min/km${f.hr?`, snitt puls ${f.hr}`:''}${f.maxHr?`, maks ${f.maxHr}`:''}${f.suffer?`, suffer ${f.suffer}`:''},stigning ${f.elev}m`}).join('\n');
  return`\n\n## Treningsdata fra Strava\n### Ukeoversikt (siste 4 uker):\n${ws}\n\n### Siste ${Math.min(runs.length,10)} løpeøkter:\n${rr}`;
}
function buildCtx(){
  const p=state.profile;if(!p.name)return'';
  const ml=p.logs?.length?`\nManuelt loggede økter:\n${p.logs.slice(-5).map(l=>`- ${l.date}: ${l.type}, ${l.distance}km, ${l.duration}min — ${l.feeling}`).join('\n')}`:'';
  const sv=state.stravaActivities?.length?fmtStravaForAI(state.stravaActivities):'';
  return`\n\nBrukerprofil:\n- Navn: ${p.name}\n- Alder: ${p.age} år\n- Løpeerfaring: ${p.experience}\n- Nåværende form: ${p.fitness}\n- Mål: ${p.goal}\n- Km per uke: ${p.weeklyKm}\n- Skader/begrensninger: ${p.injuries||'Ingen'}${ml}${sv}`;
}

async function stravaFetchAll(token){
  let all=[],page=1;
  while(true){
    const r=await fetch(`https://www.strava.com/api/v3/athlete/activities?per_page=200&page=${page}`,{headers:{Authorization:`Bearer ${token}`}});
    if(!r.ok)break;
    const batch=await r.json();
    if(!batch.length)break;
    all=all.concat(batch);
    if(batch.length<200)break;
    page++;
  }
  return all;
}

async function stravaConnect(creds){
  state.stravaStatus='connecting';render();
  try{
    let r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:creds.clientId,client_secret:creds.clientSecret,code:creds.code,grant_type:'authorization_code'})});
    let d;
    if(r.ok){d=await r.json()}else{
      r=await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:creds.clientId,client_secret:creds.clientSecret,refresh_token:creds.code,grant_type:'refresh_token'})});
      if(!r.ok)throw new Error('Feil');d=await r.json();
    }
    state.stravaCreds={clientId:creds.clientId,clientSecret:creds.clientSecret,refreshToken:d.refresh_token};
    SS('stravaCreds',state.stravaCreds);
    const acts=await stravaFetchAll(d.access_token);
    state.stravaActivities=acts;SS('stravaActivities',acts);
    state.stravaStatus='connected';
  }catch(e){console.error(e);state.stravaStatus='error'}
  render();
}
async function stravaRefresh(){
  const c=state.stravaCreds;if(!c.refreshToken)return;
  try{
    const d=await(await fetch('https://www.strava.com/oauth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:c.clientId,client_secret:c.clientSecret,refresh_token:c.refreshToken,grant_type:'refresh_token'})})).json();
    state.stravaCreds.refreshToken=d.refresh_token;SS('stravaCreds',state.stravaCreds);
    const acts=await stravaFetchAll(d.access_token);
    state.stravaActivities=acts;SS('stravaActivities',acts);state.stravaStatus='connected';render();
  }catch(e){console.error(e)}
}

// ─── KI Coach ───
async function askCoach(msgs){
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':state.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:API_MODEL,max_tokens:1500,system:getSystemPrompt()+buildCtx(),messages:msgs})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.content.map(b=>b.text||'').join('\n');
}

function fmtMsg(text){
  return text.split('\n').map(line=>{
    if(line.startsWith('###'))return`<h4>${line.replace(/^#+\s*/,'')}</h4>`;
    if(line.startsWith('**')&&line.endsWith('**'))return`<p class="bold">${line.replace(/\*\*/g,'')}</p>`;
    if(line.startsWith('- '))return`<p class="li">• ${line.slice(2)}</p>`;
    return`<p>${line||'&nbsp;'}</p>`;
  }).join('');
}

async function sendChat(text){
  if(!text.trim()||state.chatLoading)return;
  // Create new chat if none active
  if(!state.activeChatId){
    const id=Date.now().toString();
    const title=text.slice(0,50)+(text.length>50?'...':'');
    state.activeChatId=id;
    state.chatHistory.unshift({id,title,messages:[],updatedAt:new Date().toISOString()});
  }
  state.chatMessages.push({role:'user',content:text});
  state.chatLoading=true;state.chatView='chat';render();
  try{
    const reply=await askCoach(state.chatMessages);
    state.chatMessages.push({role:'assistant',content:reply});
  }catch(e){state.chatMessages.push({role:'assistant',content:`⚠️ Feil: ${e.message}`})}
  state.chatLoading=false;
  // Save to history
  const chat=state.chatHistory.find(c=>c.id===state.activeChatId);
  if(chat){chat.messages=[...state.chatMessages];chat.updatedAt=new Date().toISOString()}
  SS('chatHistory',state.chatHistory);
  render();
  setTimeout(()=>{const el=document.getElementById('chat-bottom');el&&el.scrollIntoView({behavior:'smooth'})},50);
}

function quickAsk(msg){state.chatMessages=[];state.activeChatId=null;state.chatView='chat';state.tab='coach';render();setTimeout(()=>sendChat(msg),100)}
function newChat(){state.chatMessages=[];state.activeChatId=null;state.chatView='chat';render()}
function openChat(id){const c=state.chatHistory.find(h=>h.id===id);if(c){state.activeChatId=id;state.chatMessages=[...c.messages];state.chatView='chat';render()}}
function deleteChat(id){state.chatHistory=state.chatHistory.filter(c=>c.id!==id);SS('chatHistory',state.chatHistory);if(state.activeChatId===id){state.activeChatId=null;state.chatMessages=[]}render()}

function render(){
  // Save focus state before re-render
  const ae=document.activeElement;
  const focusId=ae?.id||'';
  const focusStart=ae?.selectionStart;
  const focusEnd=ae?.selectionEnd;
  const focusVal=ae?.value;

  const app=document.getElementById('app');
  if(state.authLoading){app.innerHTML='<div class="auth-loading">Laster...</div>';return}
  if(!window.currentUser){app.innerHTML=renderAuth();return}
  if(!state.apiKey){app.innerHTML=renderApiSetup();return}
  if(state.editingProfile){app.innerHTML=renderOnboarding(true);return}

  const runs=(state.stravaActivities||[]).filter(a=>a.type==='Run'||a.type==='TrailRun');

  app.innerHTML=`
    <div class="app-content">
      <div class="page ${state.tab==='home'?'active':''}" id="page-home">${renderDashboard(runs)}</div>
      <div class="page ${state.tab==='coach'?'active':''}" id="page-coach" style="display:${state.tab==='coach'?'flex':'none'};flex-direction:column;height:100%;overflow:${state.chatView==='list'?'auto':'hidden'}">${renderChat(runs)}</div>
      <div class="page ${state.tab==='log'?'active':''}" id="page-log">${renderLog()}</div>
      <div class="page ${state.tab==='settings'?'active':''}" id="page-settings">${renderSettings()}</div>
    </div>
    <nav class="tab-bar">
      ${['home|run|Hjem','coach|chat|Trener','log|log|Aktivitet','settings|gear|Innstillinger'].map(t=>{const[id,ic,lb]=t.split('|');return`<button class="tab ${state.tab===id?'active':''}" onclick="switchTab('${id}')">${ICO[ic]}<span>${lb}</span></button>`}).join('')}
    </nav>`;

  // Restore focus
  if(focusId){
    const el=document.getElementById(focusId);
    if(el){
      el.focus();
      if(typeof focusStart==='number'&&el.setSelectionRange){
        try{el.setSelectionRange(focusStart,focusEnd)}catch(e){}
      }
    }
  }
}

      <button class="btn-primary" style="width:100%;justify-content:center" onclick="doAuth()">${mode==='login'?'Logg inn':'Opprett konto'}</button>
    </div>

async function doAuth(){
  const email=document.getElementById('authEmail').value.trim();
  const pass=document.getElementById('authPass').value;
  if(!email||!pass){state.authError='Fyll inn e-post og passord';render();return}
  state.authError='';
  try{
    if(state.authMode==='login'){
      await window.fbSignIn(window.fbAuth, email, pass);
    }else{
      await window.fbSignUp(window.fbAuth, email, pass);
    }
  }catch(e){
    const msg=e.code==='auth/user-not-found'?'Ingen konto med denne e-posten'
      :e.code==='auth/wrong-password'||e.code==='auth/invalid-credential'?'Feil passord'
      :e.code==='auth/email-already-in-use'?'E-posten er allerede i bruk'
      :e.code==='auth/weak-password'?'Passordet må ha minst 6 tegn'
      :e.code==='auth/invalid-email'?'Ugyldig e-postadresse'
      :`Feil: ${e.message}`;
    state.authError=msg;render();
  }
}

function renderOnboarding(editing=false){
  const step=state.onboardingStep;
  const cur=ONBOARDING_STEPS[step];
  const form=editing?{...state.profile,...state.onboardingForm}:state.onboardingForm;
  const val=form[cur.key]||'';
  const dots=ONBOARDING_STEPS.map((_,i)=>`<div class="progress-dot ${i<=step?'active':''}"></div>`).join('');
  let input='';
  if(cur.type==='select'){
    input=`<div class="option-list">${cur.options.map(o=>`<button class="option-btn ${val===o?'selected':''}" onclick="obSet('${cur.key}',this.dataset.v)" data-v="${o}">${val===o?ICO.check:''}${o}</button>`).join('')}</div>`;
  }else{
    input=`<input class="onboarding-input" id="ob-input" type="${cur.type}" placeholder="${cur.placeholder}" value="${val}" oninput="obSet('${cur.key}',this.value,true)" autofocus>`;
  }
  const back=step>0?`<button class="btn-secondary" onclick="obBack()">Tilbake</button>`:'';
  const next=step<ONBOARDING_STEPS.length-1?`<button class="btn-primary" ${!val?'disabled':''} onclick="obNext()">Neste</button>`:`<button class="btn-primary" ${!val?'disabled':''} onclick="obFinish(${editing})">${editing?'Lagre':'Ferdig!'}</button>`;
  return`<div class="onboarding"><div class="onboarding-progress">${dots}</div><h2 class="onboarding-label">${cur.label}</h2>${input}<div class="onboarding-nav">${back}${next}</div></div>`;
}
function obSet(k,v,noRender){state.onboardingForm[k]=v;if(!noRender)render()}

function obFinish(editing){
  state.profile={...state.profile,...state.onboardingForm,logs:state.profile.logs||[]};
  SS('profile',state.profile);state.profileDone=true;SS('profileDone',true);
  state.onboardingStep=0;state.onboardingForm={};
  if(editing){state.editingProfile=false;state.tab='settings'}
  render();
}

  const weekPaceAvg=weekRuns.length?weekRuns.reduce((s,a)=>s+(a.distance>0?a.moving_time/60/(a.distance/1000):0),0)/weekRuns.length:0;
  const wpMin=Math.floor(weekPaceAvg),wpSec=Math.round((weekPaceAvg-wpMin)*60).toString().padStart(2,'0');

function setGoalField(k,v,noRender){

function saveGoal(){
  if(!state.goal)return;

  if(state.gpxData)state.goal.gpxInfo=`${state.gpxData.distance} km, ${state.gpxData.elevation}m stigning, maks høyde ${state.gpxData.maxElev}m, min høyde ${state.gpxData.minElev}m`;
  SS('goal',state.goal);
  state.showGoalPage=false;render();
}

function handleGpxUpload(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const parser=new DOMParser();
      const xml=parser.parseFromString(e.target.result,'text/xml');
      const trkpts=[...xml.querySelectorAll('trkpt')];
      if(!trkpts.length){alert('Ingen punkter funnet i GPX-filen.');return}
      let totalDist=0;const elevs=[];
      trkpts.forEach((pt,i)=>{
        const lat=parseFloat(pt.getAttribute('lat')),lon=parseFloat(pt.getAttribute('lon'));
        const eleEl=pt.querySelector('ele');
        const ele=eleEl?parseFloat(eleEl.textContent):0;
        elevs.push(ele);
        if(i>0){
          const prev=trkpts[i-1];
          const pLat=parseFloat(prev.getAttribute('lat')),pLon=parseFloat(prev.getAttribute('lon'));
          totalDist+=haversine(pLat,pLon,lat,lon);
        }
      });
      const maxElev=Math.round(Math.max(...elevs)),minElev=Math.round(Math.min(...elevs));
      let totalClimb=0;
      for(let i=1;i<elevs.length;i++){const d=elevs[i]-elevs[i-1];if(d>0)totalClimb+=d}
      // Build simple elevation profile SVG
      const w=300,h=80;
      const step=Math.max(1,Math.floor(elevs.length/w));
      const sampled=[];for(let i=0;i<elevs.length;i+=step)sampled.push(elevs[i]);
      const eMin=Math.min(...sampled),eMax=Math.max(...sampled),eRange=eMax-eMin||1;
      const points=sampled.map((e,i)=>`${(i/(sampled.length-1)*w).toFixed(1)},${(h-(e-eMin)/eRange*h).toFixed(1)}`).join(' ');
      const profileSvg=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:60px"><polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="1.5"/><polygon points="0,${h} ${points} ${w},${h}" fill="var(--accent)" opacity="0.15"/></svg>`;

      state.gpxData={name:file.name,distance:totalDist.toFixed(1),elevation:Math.round(totalClimb),maxElev,minElev,profileSvg};
      if(!state.goal)state.goal={distance:'',time:'',raceName:'',raceDate:'',isTrail:false,gpxInfo:'',createdAt:new Date().toISOString()};
      if(!state.goal.distance&&totalDist>0){
        if(totalDist<7)state.goal.distance='5 km';
        else if(totalDist<15)state.goal.distance='10 km';
        else state.goal.distance='Halvmaraton';
      }
      render();
    }catch(err){alert('Kunne ikke lese GPX-filen: '+err.message)}
  };
  reader.readAsText(file);
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function timeAgo(date){
  const s=Math.floor((Date.now()-date)/1000);
  if(s<60)return'Nå nettopp';if(s<3600)return`${Math.floor(s/60)} min siden`;
  if(s<86400)return`${Math.floor(s/3600)}t siden`;if(s<604800)return`${Math.floor(s/86400)}d siden`;
  return date.toLocaleDateString('no-NO',{day:'numeric',month:'short'});
}

    const f=fmtActivity(a);
    return {source:'strava',id:a.id.toString(),date:f.date,name:f.name,km:parseFloat(f.km),mins:f.mins,pace:f.pace,hr:f.hr,maxHr:f.maxHr,elev:f.elev,suffer:a.suffer_score,type:a.type==='TrailRun'?'Terreng':'Løp',shoeId:state.shoeMap[a.id]||'',stravaId:a.id};
  });

  const all=[...stravaRuns,...manualLogs].sort((a,b)=>b.date.localeCompare(a.date));

  const totalKm=all.reduce((s,l)=>s+l.km,0);

  const shoes=state.shoes.filter(s=>!s.retired);
  const shoeOpts=shoes.length?`<option value="">👟 —</option>${shoes.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}`:'';

  let formHtml='';

    formHtml=`<div class="log-form">
      <label>Dato</label><input type="date" id="log-date" value="${f.date}" oninput="state.logForm.date=this.value">
      <label>Type økt</label><select id="log-type" onchange="state.logForm.type=this.value">${['Rolig løp','Intervall','Tempo','Langtur','Fartlek','Bakkeløp','Annet'].map(t=>`<option ${f.type===t?'selected':''}>${t}</option>`).join('')}</select>
      <label>Distanse (km)</label><input type="number" id="log-dist" step="0.1" placeholder="F.eks. 8.5" value="${f.distance}" oninput="state.logForm.distance=this.value">
      <label>Varighet (min)</label><input type="number" id="log-dur" placeholder="F.eks. 45" value="${f.duration}" oninput="state.logForm.duration=this.value">
      <label>Følelse</label><div class="feeling-row">${['Bra','Ok','Tungt'].map(fl=>`<button class="feeling-btn ${f.feeling===fl?'selected':''}" onclick="state.logForm.feeling='${fl}';render()">${fl==='Bra'?'😊':fl==='Tungt'?'😓':'😐'} ${fl}</button>`).join('')}</div>
      ${shoeSelect}
      <label>Notater (valgfritt)</label><textarea id="log-notes" placeholder="Hvordan gikk det?" oninput="state.logForm.notes=this.value">${f.notes}</textarea>
      <div class="form-actions"><button class="btn-secondary" onclick="state.showLogForm=false;render()">Avbryt</button><button class="btn-primary" onclick="saveLog()">Lagre</button></div>
    </div>`;
  }else{
    formHtml=`<button class="btn-primary add-log-btn" onclick="state.showLogForm=true;render()">${ICO.plus} Logg manuell økt</button>`;
  }

  const listHtml=all.length?all.map((l,idx)=>{
    const shoe=l.shoeId?state.shoes.find(s=>s.id===l.shoeId):null;
    const srcBadge=l.source==='strava'?'<span class="src-badge strava-badge">Strava</span>':'<span class="src-badge manual-badge">Manuell</span>';
    const shoeLabel=shoe?`<span class="shoe-tag">👟 ${shoe.name}</span>`:(shoes.length&&l.source==='strava'?`<select class="shoe-inline-select" onclick="event.stopPropagation()" onchange="assignShoe('${l.id}',this.value)">${shoeOpts}</select>`:'');
    const paceInfo=l.pace?` · ${l.pace} /km`:'';
    const hrInfo=l.hr?` · ♥ ${l.hr}`:'';
    const feelInfo=l.feeling?` · ${l.feeling==='Bra'?'😊':l.feeling==='Tungt'?'😓':'😐'}`:''
    return`<div class="log-entry clickable" onclick="openActivity('${l.source}','${l.id}')">
      <div class="log-entry-header"><span class="log-entry-date">${l.date}</span>${srcBadge}</div>

function openActivity(source,id){
  let act=null;
  if(source==='strava'){
    const raw=(state.stravaActivities||[]).find(a=>a.id.toString()===id);
    if(raw){const f=fmtActivity(raw);act={source,id,date:f.date,name:f.name,km:parseFloat(f.km),mins:f.mins,pace:f.pace,hr:f.hr,maxHr:f.maxHr,elev:f.elev,suffer:raw.suffer_score,calories:raw.calories||null,shoeId:state.shoeMap[raw.id]||'',stravaId:raw.id,movingTime:raw.moving_time,elapsedTime:raw.elapsed_time,maxSpeed:raw.max_speed?((raw.max_speed*3.6).toFixed(1)):null};}
  }else{
    const idx=parseInt(id.slice(1));const l=(state.profile.logs||[])[idx];
    if(l)act={source,id,date:l.date,name:l.type,km:parseFloat(l.distance)||0,mins:parseInt(l.duration)||0,feeling:l.feeling,shoeId:l.shoeId||'',notes:l.notes};
  }
  if(act){state.activeActivity=act;render()}
}

    <div class="detail-stats-grid">${stats}</div>
    ${shoe?`<div class="detail-shoe">👟 ${shoe.name}</div>`:''}
    ${a.notes?`<div class="detail-notes">${a.notes}</div>`:''}
    ${stravaLink}
    ${summaryHtml}
  </div>`;
}

async function summarizeActivity(){
  const a=state.activeActivity;if(!a||state.summaryLoading)return;
  state.summaryLoading=true;render();
  let prompt=`Gi en kort oppsummering og analyse av denne løpeøkten:\n- Navn: ${a.name}\n- Dato: ${a.date}\n- Distanse: ${a.km} km\n- Tid: ${a.mins} min`;
  if(a.pace)prompt+=`\n- Tempo: ${a.pace} min/km`;
  if(a.hr)prompt+=`\n- Snitt puls: ${a.hr}`;
  if(a.maxHr)prompt+=`\n- Maks puls: ${a.maxHr}`;
  if(a.elev)prompt+=`\n- Stigning: ${a.elev}m`;
  if(a.suffer)prompt+=`\n- Suffer score: ${a.suffer}`;
  if(a.feeling)prompt+=`\n- Følelse: ${a.feeling}`;
  prompt+=`\n\nVurder: Var dette en rolig (sone 1-2) eller hard (sone 4-5) økt basert på dataene? Passer den inn i 80/20-metoden? Gi 2-3 korte punkter med feedback og eventuelt tips til neste økt. Hold det kort og motiverende.`;
  try{
    const reply=await askCoach([{role:'user',content:prompt}]);
    state.activitySummaries[a.id]=reply;
    SS('activitySummaries',state.activitySummaries);
  }catch(e){state.activitySummaries[a.id]=`⚠️ Feil: ${e.message}`}
  state.summaryLoading=false;render();
}

function getShoeStats(shoeId){
  const shoe=state.shoes.find(s=>s.id===shoeId);
  const offsetKm=parseFloat(shoe?.manualKm)||0;
  const offsetRuns=parseInt(shoe?.manualRuns)||0;
  // Manual logs
  const manualLogs=(state.profile.logs||[]).filter(l=>l.shoeId===shoeId);
  const manualKm=manualLogs.reduce((s,l)=>s+Number(l.distance||0),0);
  // Strava activities
  const stravaIds=Object.entries(state.shoeMap).filter(([_,sid])=>sid===shoeId).map(([aid])=>aid);
  const stravaActs=(state.stravaActivities||[]).filter(a=>stravaIds.includes(a.id.toString()));
  const stravaKm=stravaActs.reduce((s,a)=>s+a.distance/1000,0);
  const totalKm=manualKm+stravaKm+offsetKm;
  const runCount=manualLogs.length+stravaActs.length+offsetRuns;
  const avgKm=runCount>0?(totalKm/runCount).toFixed(1):'0';
  return {totalKm,runCount,avgKm};
}

function renderShoes(){

    formHtml=`<div class="log-form shoe-form">

      <label>Type</label><div class="feeling-row">${['Asfalt','Konkurranse','Terreng','Piggsko'].map(t=>`<button class="feeling-btn ${f.type===t?'selected':''}" onclick="state.shoeForm.type='${t}';render()">${t==='Asfalt'?'🛣️':t==='Konkurranse'?'🏁':t==='Terreng'?'⛰️':'🧊'} ${t}</button>`).join('')}</div>
      <label>Bilde (valgfritt)</label>
      <div class="photo-upload" onclick="document.getElementById('shoePhotoInput').click()">
        ${f.photo?`<img src="${f.photo}" class="shoe-preview">`:`<div class="photo-placeholder">${ICO.camera}<span>Trykk for å laste opp</span></div>`}
      </div>

      <label>Tidligere km (før appen)</label><input type="number" step="0.1" placeholder="0" value="${f.manualKm||''}" oninput="state.shoeForm.manualKm=this.value">
      <label>Tidligere antall løp</label><input type="number" placeholder="0" value="${f.manualRuns||''}" oninput="state.shoeForm.manualRuns=this.value">
      <div class="form-actions"><button class="btn-secondary" onclick="state.showShoeForm=false;render()">Avbryt</button><button class="btn-primary" onclick="saveShoe()">Lagre</button></div>
    </div>`;
  }else{
    formHtml=`<button class="btn-primary add-log-btn" onclick="state.showShoeForm=true;state.shoeForm={name:'',type:'Asfalt',photo:'',manualKm:0,manualRuns:0};render()">${ICO.plus} Legg til sko</button>`;
  }

  const shoeCards=shoes.length?shoes.map(s=>{
    const stats=getShoeStats(s.id);
    const typeEmoji=s.type==='Asfalt'?'🛣️':s.type==='Konkurranse'?'🏁':s.type==='Terreng'?'⛰️':'🧊';
    const editing=state.editingShoeId===s.id;
    return`<div class="shoe-card ${s.retired?'retired':''}">
      <div class="shoe-card-top">
        ${s.photo?`<img src="${s.photo}" class="shoe-thumb">`:`<div class="shoe-thumb-placeholder">👟</div>`}
        <div class="shoe-info">
          <div class="shoe-name">${s.name}${s.retired?' <span class="retired-badge">Pensjonert</span>':''}</div>
          <div class="shoe-type">${typeEmoji} ${s.type}</div>
        </div>
        <button class="shoe-menu-btn" onclick="toggleShoeMenu('${s.id}')">⋮</button>
      </div>
      <div class="shoe-stats-row">
        <div class="shoe-stat"><span class="shoe-stat-val">${stats.totalKm.toFixed(1)}</span><span class="shoe-stat-lbl">km</span></div>
        <div class="shoe-stat"><span class="shoe-stat-val">${stats.runCount}</span><span class="shoe-stat-lbl">løp</span></div>
        <div class="shoe-stat"><span class="shoe-stat-val">${stats.avgKm}</span><span class="shoe-stat-lbl">snitt km</span></div>
      </div>
      ${editing?`<div class="shoe-edit-offsets">
        <div class="shoe-edit-row"><label>Tidligere km</label><input type="number" step="0.1" id="shoe-km-${s.id}" value="${s.manualKm||0}"></div>
        <div class="shoe-edit-row"><label>Tidligere løp</label><input type="number" id="shoe-runs-${s.id}" value="${s.manualRuns||0}"></div>
        <div class="form-actions"><button class="btn-secondary" onclick="state.editingShoeId=null;render()">Avbryt</button><button class="btn-primary" onclick="saveShoeOffsets('${s.id}')">Lagre</button></div>
      </div>`:''}
      <div class="shoe-menu hide" id="shoe-menu-${s.id}">
        <button onclick="editShoeOffsets('${s.id}')">Rediger km/løp</button>
        ${s.retired?`<button onclick="unretireShoe('${s.id}')">Aktiver igjen</button>`:`<button onclick="retireShoe('${s.id}')">Pensjoner</button>`}
        <button class="danger-text" onclick="if(confirm('Slette ${s.name}?'))deleteShoe('${s.id}')">Slett</button>

  }).join(''):`<div class="empty-log">Ingen sko lagt til ennå.</div>`;

  return`${formHtml}<div class="shoe-list">${shoeCards}</div>`;

function handleShoePhoto(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    // Resize to save localStorage space
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      const max=300;
      let w=img.width,h=img.height;
      if(w>h){h=h*(max/w);w=max}else{w=w*(max/h);h=max}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      state.shoeForm.photo=canvas.toDataURL('image/jpeg',0.7);
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function saveShoe(){
  const f=state.shoeForm;if(!f.name.trim())return;
  state.shoes.push({id:Date.now().toString(),name:f.name.trim(),type:f.type,photo:f.photo,retired:false,manualKm:parseFloat(f.manualKm)||0,manualRuns:parseInt(f.manualRuns)||0});
  SS('shoes',state.shoes);state.showShoeForm=false;render();
}
function editShoeOffsets(id){
  const s=state.shoes.find(s=>s.id===id);if(!s)return;
  state.editingShoeId=id;render();
}
function saveShoeOffsets(id){
  const s=state.shoes.find(s=>s.id===id);if(!s)return;
  const kmEl=document.getElementById('shoe-km-'+id);
  const runsEl=document.getElementById('shoe-runs-'+id);
  if(kmEl)s.manualKm=parseFloat(kmEl.value)||0;
  if(runsEl)s.manualRuns=parseInt(runsEl.value)||0;
  SS('shoes',state.shoes);state.editingShoeId=null;render();
}
function retireShoe(id){const s=state.shoes.find(s=>s.id===id);if(s){s.retired=true;SS('shoes',state.shoes);render()}}
function unretireShoe(id){const s=state.shoes.find(s=>s.id===id);if(s){s.retired=false;SS('shoes',state.shoes);render()}}
function deleteShoe(id){state.shoes=state.shoes.filter(s=>s.id!==id);SS('shoes',state.shoes);render()}
function toggleShoeMenu(id){const el=document.getElementById('shoe-menu-'+id);if(el)el.classList.toggle('hide')}

function saveLog(){
  const f=state.logForm;if(!f.distance||!f.duration)return;
  state.profile.logs=state.profile.logs||[];state.profile.logs.push({...f});
  SS('profile',state.profile);state.showLogForm=false;
  state.logForm={date:new Date().toISOString().slice(0,10),type:'Rolig løp',distance:'',duration:'',feeling:'Ok',notes:'',shoeId:''};
  render();
}

// ─── Statistics ───
function renderStats(){
  const runs=(state.stravaActivities||[]).filter(a=>a.type==='Run'||a.type==='TrailRun');
  const now=new Date();
  const thisYear=now.getFullYear();
  const lastYear=thisYear-1;

  const runsThisYear=runs.filter(a=>new Date(a.start_date_local).getFullYear()===thisYear);
  const runsLastYear=runs.filter(a=>new Date(a.start_date_local).getFullYear()===lastYear);

  const kmThis=runsThisYear.reduce((s,a)=>s+a.distance/1000,0);
  const kmLast=runsLastYear.reduce((s,a)=>s+a.distance/1000,0);
  const countThis=runsThisYear.length;
  const countLast=runsLastYear.length;

  const longestEver=runs.length?Math.max(...runs.map(a=>a.distance/1000)):0;
  const longestYear=runsThisYear.length?Math.max(...runsThisYear.map(a=>a.distance/1000)):0;

  const elevThis=runsThisYear.reduce((s,a)=>s+(a.total_elevation_gain||0),0);

  // Runs per week this year
  const dayOfYear=Math.floor((now-new Date(thisYear,0,1))/(86400000))+1;
  const weeksElapsed=Math.max(1,dayOfYear/7);
  const runsPerWeek=(countThis/weeksElapsed).toFixed(1);

  // Monthly km this year
  const monthlyKm=Array(12).fill(0);
  runsThisYear.forEach(a=>{const m=new Date(a.start_date_local).getMonth();monthlyKm[m]+=a.distance/1000});
  const maxMonthKm=Math.max(...monthlyKm,1);
  const monthNames=['Jan','Feb','Mar','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Des'];

  // Run vs Trail pie
  const roadCount=runs.filter(a=>a.type==='Run').length;
  const trailCount=runs.filter(a=>a.type==='TrailRun').length;
  const totalType=roadCount+trailCount||1;
  const roadPct=Math.round(roadCount/totalType*100);
  const trailPct=100-roadPct;

  // Most popular shoes
  function topShoes(runList){
    const counts={};
    runList.forEach(a=>{const sid=state.shoeMap[a.id];if(sid){counts[sid]=(counts[sid]||0)+1}});
    // Also manual logs
    (state.profile.logs||[]).forEach(l=>{if(l.shoeId){const yr=new Date(l.date).getFullYear();if(runList===runs||yr===thisYear)counts[l.shoeId]=(counts[l.shoeId]||0)+1}});
    return Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([id,cnt])=>{
      const s=state.shoes.find(s=>s.id===id);return s?{name:s.name,count:cnt,type:s.type}:null;
    }).filter(Boolean);
  }
  const topShoesAll=topShoes(runs);
  const topShoesYear=topShoes(runsThisYear);

  // Bar chart SVG
  const barW=Math.floor(280/12);
  const barH=120;
  const bars=monthlyKm.map((km,i)=>{
    const h=maxMonthKm>0?Math.max(2,km/maxMonthKm*barH):0;
    const x=i*barW+Math.floor(barW/2)-8;
    const isPast=i<=now.getMonth();
    return`<rect x="${x}" y="${barH-h}" width="16" rx="4" height="${h}" fill="${isPast?'var(--accent)':'var(--border)'}" opacity="${isPast?1:0.3}"/>
      <text x="${x+8}" y="${barH+14}" text-anchor="middle" fill="var(--text2)" font-size="9" font-family="DM Sans">${monthNames[i]}</text>
      ${km>0?`<text x="${x+8}" y="${barH-h-4}" text-anchor="middle" fill="var(--text)" font-size="9" font-weight="600" font-family="Space Mono">${Math.round(km)}</text>`:''}`;
  }).join('');
  const barChart=`<svg viewBox="0 0 ${barW*12} ${barH+20}" class="bar-chart">${bars}</svg>`;

  // Pie chart SVG
  const pieR=50,pieC=60;
  const roadAngle=roadPct/100*360;
  function pieArc(start,end,color){
    if(end-start>=360)return`<circle cx="${pieC}" cy="${pieC}" r="${pieR}" fill="${color}"/>`;
    const s=start-90,e=start+end-90;
    const sr=s*Math.PI/180,er=e*Math.PI/180;
    const x1=pieC+pieR*Math.cos(sr),y1=pieC+pieR*Math.sin(sr);
    const x2=pieC+pieR*Math.cos(er),y2=pieC+pieR*Math.sin(er);
    const large=end>180?1:0;
    return`<path d="M${pieC},${pieC} L${x1},${y1} A${pieR},${pieR} 0 ${large} 1 ${x2},${y2} Z" fill="${color}"/>`;
  }
  const pieChart=trailCount===0?`<circle cx="${pieC}" cy="${pieC}" r="${pieR}" fill="var(--accent)"/>`
    :roadCount===0?`<circle cx="${pieC}" cy="${pieC}" r="${pieR}" fill="var(--strava)"/>`
    :`${pieArc(0,roadAngle,'var(--accent)')}${pieArc(roadAngle,360-roadAngle,'var(--strava)')}`;

  const shoeList=(list,label)=>list.length?`<div class="stats-shoe-section"><div class="stats-shoe-label">${label}</div>${list.map((s,i)=>{
    const emoji=s.type==='Asfalt'?'🛣️':s.type==='Konkurranse'?'🏁':s.type==='Terreng'?'⛰️':'🧊';
    return`<div class="stats-shoe-item"><span class="stats-shoe-rank">${i+1}.</span><span>${emoji} ${s.name}</span><span class="stats-shoe-cnt">${s.count} løp</span></div>`;
  }).join('')}</div>`:'';

  return`<div class="stats-page">
    <h2 class="stats-title">Statistikk</h2>

    <div class="stats-compare">
      <div class="stats-col">
        <div class="stats-year-label">${lastYear}</div>
        <div class="stats-big">${kmLast.toFixed(0)}</div><div class="stats-small">km</div>
        <div class="stats-secondary">${countLast} løp</div>
      </div>
      <div class="stats-divider"></div>
      <div class="stats-col">
        <div class="stats-year-label">${thisYear}</div>
        <div class="stats-big accent">${kmThis.toFixed(0)}</div><div class="stats-small">km</div>
        <div class="stats-secondary">${countThis} løp</div>
      </div>
    </div>

    <div class="detail-stats-grid" style="margin-bottom:20px">
      <div class="detail-stat"><span class="detail-stat-val">${longestEver.toFixed(1)}</span><span class="detail-stat-lbl">lengste (totalt)</span></div>
      <div class="detail-stat"><span class="detail-stat-val">${longestYear.toFixed(1)}</span><span class="detail-stat-lbl">lengste (${thisYear})</span></div>
      <div class="detail-stat"><span class="detail-stat-val">${runsPerWeek}</span><span class="detail-stat-lbl">løp/uke snitt</span></div>
      <div class="detail-stat"><span class="detail-stat-val">${Math.round(elevThis)}</span><span class="detail-stat-lbl">stigning ${thisYear} (m)</span></div>
    </div>

    <div class="stats-card">
      <div class="stats-card-title">Distanse per måned ${thisYear}</div>
      ${barChart}
    </div>

    <div class="stats-card">
      <div class="stats-card-title">Asfalt vs. terreng (totalt)</div>
      <div class="pie-row">
        <svg viewBox="0 0 120 120" class="pie-chart">${pieChart}</svg>
        <div class="pie-legend">
          <div class="pie-legend-item"><span class="pie-dot" style="background:var(--accent)"></span>Asfalt ${roadPct}%</div>
          <div class="pie-legend-item"><span class="pie-dot" style="background:var(--strava)"></span>Terreng ${trailPct}%</div>
        </div>
      </div>
    </div>

    ${shoeList(topShoesAll,'Mest brukte sko (totalt)')}
    ${shoeList(topShoesYear,'Mest brukte sko ('+thisYear+')')}

    ${!runs.length?'<div class="empty-log">Koble til Strava for å se statistikk.</div>':''}
  </div>`;
}

function renderSettings(){
  const p=state.profile;

  const statusHtml=ss==='connected'?`<div class="strava-status connected">${ICO.check} Koblet til Strava</div>`:ss==='connecting'?`<div class="strava-status connecting">Kobler til...</div>`:ss==='error'?`<div class="strava-status error">⚠️ Tilkobling feilet</div>`:'';

  const userEmail=window.currentUser?.email||'';
  
  return`<div class="settings-page">
    <h2 class="settings-title">Innstillinger</h2>
    ${userEmail?`<div style="font-size:13px;color:var(--text2);margin:-16px 0 16px">Logget inn som ${userEmail}</div>`:''}
    <button class="settings-row" onclick="state.editingProfile=true;state.onboardingStep=0;state.onboardingForm={...state.profile};render()">
      ${ICO.user}<div><div class="settings-row-title">Rediger profil</div><div class="settings-row-sub">${p.name||'Ikke satt opp'} ${p.goal?'· '+p.goal:''}</div></div><span class="settings-arrow">→</span>
    </button>
    <div class="strava-setup">
      <div class="strava-header"><span class="strava-logo">${ICO.strava}</span><h3>Koble til Strava</h3></div>
      ${statusHtml}
      <div class="strava-guide">
        <p class="guide-title">Slik gjør du (engangsoppsett):</p>
        <div class="guide-step"><span class="step-num">1</span><span>Gå til <strong>strava.com/settings/api</strong> og opprett en app</span></div>
        <div class="guide-step"><span class="step-num">2</span><span>Kopier <strong>Client ID</strong> og <strong>Client Secret</strong></span></div>
        <div class="guide-step"><span class="step-num">3</span><span>Åpne autorisasjonslenken (bytt ut [ID]):</span></div>
        <div class="guide-url">https://www.strava.com/oauth/authorize?client_id=<strong>[ID]</strong>&response_type=code&redirect_uri=http://localhost&scope=read,activity:read_all&approval_prompt=force</div>
        <div class="guide-step"><span class="step-num">4</span><span>Kopier <strong>code=</strong>-verdien fra URL-en</span></div>
      </div>
      <div class="strava-form">
        <label>Client ID</label><input type="text" id="strClientId" placeholder="12345" value="${state.stravaCreds.clientId||''}">
        <label>Client Secret</label><input type="password" id="strClientSecret" placeholder="abc123..." value="${state.stravaCreds.clientSecret||''}">
        <label>Autorisasjonskode</label><input type="text" id="strCode" placeholder="Koden fra URL-en">
        <button class="btn-strava" onclick="doStravaConnect()">🔗 Koble til Strava</button>
      </div>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logg ut</button>
    <button class="reset-btn" onclick="if(confirm('Er du sikker? Alt slettes.')){localStorage.clear();location.reload()}">Nullstill alt</button>
  </div>`;
}
function doStravaConnect(){
  const cid=document.getElementById('strClientId').value;
  const cs=document.getElementById('strClientSecret').value;
  const code=document.getElementById('strCode').value;
  if(cid&&cs&&code)stravaConnect({clientId:cid,clientSecret:cs,code});
}

// Initial render (shows loading while Firebase checks auth)
render();
</script>
